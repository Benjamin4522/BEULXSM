cat > api/frontend/templates/index.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEULXSM - AI Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 BEULXSM Agent</h1>
            <p>Advanced Autonomous Coding & Offensive AI Agent</p>
        </header>

        <div id="chat-container">
            <div id="chat-messages"></div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ketikan goal atau perintah di sini..." autocomplete="off">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser ? 'user-message' : 'agent-message';
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                addMessage(data.response, false);
            } catch (error) {
                addMessage("Error koneksi ke agent.", false);
            }
        }

        // Kirim dengan Enter
        userInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
EOF
